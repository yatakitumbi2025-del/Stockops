<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f0f2f5; min-height: 100vh; }

  /* NAV */
  nav { background: #1a1a2e; padding: 0 20px; display: flex; gap: 4px; }
  nav button {
    background: none; border: none; color: #aaa;
    padding: 16px 20px; cursor: pointer; font-size: 14px; font-weight: 500;
    border-bottom: 3px solid transparent;
  }
  nav button.active { color: #fff; border-bottom-color: #e8a020; }

  /* PAGES */
  .page { display: none; padding: 24px; max-width: 800px; margin: 0 auto; }
  .page.active { display: block; }
  h2 { font-size: 20px; margin-bottom: 20px; color: #1a1a2e; }

  /* CARDS */
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 24px; }
  .stat { background: #fff; border-radius: 10px; padding: 18px; box-shadow: 0 1px 4px #0001; }
  .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .06em; }
  .stat-value { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-top: 4px; }

  /* FORM */
  .card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px #0001; margin-bottom: 20px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
  .field input, .field select {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 14px; outline: none;
  }
  .field input:focus, .field select:focus { border-color: #e8a020; }
  .btn {
    padding: 11px 24px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .btn-primary { background: #e8a020; color: #fff; width: 100%; margin-top: 4px; }
  .btn-primary:hover { background: #d4911a; }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 14px; font-size: 11px; color: #888; text-transform: uppercase; border-bottom: 1px solid #eee; }
  td { padding: 12px 14px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
  tr:last-child td { border-bottom: none; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-ok { background: #e6f7ee; color: #27ae60; }
  .badge-low { background: #fff3e0; color: #e67e22; }
  .badge-out { background: #fdecea; color: #e74c3c; }
  .empty { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
</style>
</head>
<body>

<nav>
  <button class="active" onclick="show('dashboard', this)">📊 Dashboard</button>
  <button onclick="show('products', this)">📦 Products</button>
  <button onclick="show('sales', this)">💰 Sales</button>
</nav>

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
  <h2>Dashboard</h2>
  <div class="stats">
    <div class="stat"><div class="stat-label">Products</div><div class="stat-value" id="d-products">0</div></div>
    <div class="stat"><div class="stat-label">Total Revenue</div><div class="stat-value" id="d-revenue">$0</div></div>
    <div class="stat"><div class="stat-label">Low Stock</div><div class="stat-value" id="d-low">0</div></div>
  </div>
  <div class="card">
    <h2 style="font-size:15px;margin-bottom:14px">Recent Sales</h2>
    <table>
      <thead><tr><th>Product</th><th>Qty</th><th>Total</th><th>Date</th></tr></thead>
      <tbody id="d-sales-tbody"></tbody>
    </table>
  </div>
</div>

<!-- PRODUCTS -->
<div class="page" id="page-products">
  <h2>Products</h2>
  <div class="card">
    <div class="form-row">
      <div class="field"><label>Product Name</label><input id="p-name" placeholder="e.g. Engine Oil"></div>
      <div class="field"><label>SKU</label><input id="p-sku" placeholder="e.g. OIL-001"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Cost Price ($)</label><input id="p-cost" type="number" step="0.01" placeholder="0.00"></div>
      <div class="field"><label>Sale Price ($)</label><input id="p-sale" type="number" step="0.01" placeholder="0.00"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Stock Quantity</label><input id="p-stock" type="number" placeholder="0"></div>
      <div class="field"><label>Reorder Point</label><input id="p-reorder" type="number" placeholder="5"></div>
    </div>
    <button class="btn btn-primary" onclick="addProduct()">+ Add Product</button>
  </div>

  <div class="card">
    <table>
      <thead><tr><th>Product</th><th>SKU</th><th>Sale Price</th><th>Stock</th><th>Status</th></tr></thead>
      <tbody id="p-tbody"></tbody>
    </table>
  </div>
</div>

<!-- SALES -->
<div class="page" id="page-sales">
  <h2>Record Sale</h2>
  <div class="card">
    <div class="form-row">
      <div class="field"><label>Product</label>
        <select id="s-product"><option value="">— select —</option></select>
      </div>
      <div class="field"><label>Quantity</label><input id="s-qty" type="number" placeholder="1" min="1"></div>
    </div>
    <div class="field" style="margin-bottom:12px"><label>Note (optional)</label><input id="s-note" placeholder="e.g. Walk-in customer"></div>
    <button class="btn btn-primary" onclick="addSale()">Record Sale</button>
  </div>

  <div class="card">
    <h2 style="font-size:15px;margin-bottom:14px">Sales History</h2>
    <table>
      <thead><tr><th>Product</th><th>Qty</th><th>Unit Price</th><th>Total</th><th>Note</th><th>Date</th></tr></thead>
      <tbody id="s-tbody"></tbody>
    </table>
  </div>
</div>

<script>
let products = [];
let sales = [];

function show(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  btn.classList.add('active');
  if (page === 'sales') populateSaleSelect();
  render();
}

function today() {
  return new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function fmt(n) { return '$' + Number(n).toFixed(2); }

function addProduct() {
  const name   = document.getElementById('p-name').value.trim();
  const sku    = document.getElementById('p-sku').value.trim() || 'SKU-' + (products.length + 1);
  const cost   = parseFloat(document.getElementById('p-cost').value) || 0;
  const sale   = parseFloat(document.getElementById('p-sale').value) || 0;
  const stock  = parseInt(document.getElementById('p-stock').value) || 0;
  const reorder= parseInt(document.getElementById('p-reorder').value) || 5;

  if (!name) return alert('Product name is required.');

  products.push({ id: Date.now(), name, sku, cost, sale, stock, reorder });
  ['p-name','p-sku','p-cost','p-sale','p-stock','p-reorder'].forEach(id => document.getElementById(id).value = '');
  render();
}

function addSale() {
  const pid  = parseInt(document.getElementById('s-product').value);
  const qty  = parseInt(document.getElementById('s-qty').value) || 1;
  const note = document.getElementById('s-note').value.trim() || '—';
  const p    = products.find(p => p.id === pid);

  if (!p) return alert('Select a product.');
  if (qty > p.stock) return alert(`Only ${p.stock} units in stock!`);

  p.stock -= qty;
  sales.push({ id: Date.now(), productId: pid, productName: p.name, qty, price: p.sale, note, date: today() });

  ['s-qty','s-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('s-product').value = '';
  render();
  populateSaleSelect();
}

function populateSaleSelect() {
  const sel = document.getElementById('s-product');
  sel.innerHTML = '<option value="">— select product —</option>' +
    products.filter(p => p.stock > 0)
      .map(p => `<option value="${p.id}">${p.name} (${p.stock} in stock)</option>`).join('');
}

function render() {
  // Dashboard
  const totalRev = sales.reduce((s, m) => s + m.qty * m.price, 0);
  const lowCount = products.filter(p => p.stock <= p.reorder).length;
  document.getElementById('d-products').textContent = products.length;
  document.getElementById('d-revenue').textContent = fmt(totalRev);
  document.getElementById('d-low').textContent = lowCount;

  const dSales = document.getElementById('d-sales-tbody');
  dSales.innerHTML = [...sales].reverse().slice(0, 5).map(s =>
    `<tr><td>${s.productName}</td><td>${s.qty}</td><td>${fmt(s.qty * s.price)}</td><td style="color:#aaa">${s.date}</td></tr>`
  ).join('') || `<tr><td colspan="4" class="empty">No sales yet</td></tr>`;

  // Products table
  document.getElementById('p-tbody').innerHTML = products.map(p => {
    const badge = p.stock === 0
      ? '<span class="badge badge-out">Out</span>'
      : p.stock <= p.reorder
        ? '<span class="badge badge-low">Low</span>'
        : '<span class="badge badge-ok">OK</span>';
    return `<tr><td><b>${p.name}</b></td><td style="color:#aaa">${p.sku}</td><td>${fmt(p.sale)}</td><td>${p.stock}</td><td>${badge}</td></tr>`;
  }).join('') || `<tr><td colspan="5" class="empty">No products yet — add one above!</td></tr>`;

  // Sales table
  document.getElementById('s-tbody').innerHTML = [...sales].reverse().map(s =>
    `<tr><td>${s.productName}</td><td>${s.qty}</td><td>${fmt(s.price)}</td><td><b>${fmt(s.qty * s.price)}</b></td><td style="color:#aaa">${s.note}</td><td style="color:#aaa">${s.date}</td></tr>`
  ).join('') || `<tr><td colspan="6" class="empty">No sales recorded yet</td></tr>`;
}

render();
</script>
</body>
</html>
